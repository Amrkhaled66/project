name: Deploy blanket-frontend

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_ADMIN_API_URL=${{ secrets.VITE_ADMIN_API_URL }} \
            -t amrse912553/blanket-frontend:latest .

      - name: Push Docker image
        run: docker push amrse912553/blanket-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Clean old Docker images (avoid no space)
        run: docker system prune -af

      - name: Pull image
        run: docker pull amrse912553/blanket-frontend:latest

      - name: Remove old container if exists
        run: docker rm -f blanket-frontend-container || true

      - name: Run container
        run: |
          docker run -d \
            -p 3000:80 \
            --name blanket-frontend-container \
            --restart unless-stopped \
            amrse912553/blanket-frontend:latest